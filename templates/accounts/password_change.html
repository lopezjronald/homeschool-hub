{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Change password · Steadfast Scholars{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 32rem;">
  <h1 class="h4 mb-3"><i class="bi bi-shield-lock me-1"></i> Change password</h1>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-amber">Update password</button>
    <a href="{% url 'accounts:settings' %}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
