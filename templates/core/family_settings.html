{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Family settings · Steadfast Scholars{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 32rem;">
  <h1 class="h4 mb-3"><i class="bi bi-people me-1"></i> Family settings</h1>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-amber">Save</button>
    <a href="{% url 'accounts:settings' %}" class="btn btn-outline-secondary">Back to settings</a>
  </form>
  <hr class="my-4">
  <a href="{% url 'core:invite_teacher' %}" class="btn btn-outline-secondary btn-sm">Manage members</a>
</div>
{% endblock %}
